body:
  text: 西晉月氏國三藏竺法護譯聞如是一時婆伽婆在舍衛城祇樹給孤獨園彼時有異比丘獨坐房中意作是念以何故世間牽以何故受於苦以何故生已生已入隨從於是彼比丘從下晡起起已往詣世尊所到已禮世尊足却坐一面彼比丘却坐一面已白世尊曰唯世尊我今日獨在房中意生是念以何故世間牽以何故受於苦以何故生已生已入隨從善哉善哉比丘有賢道有賢觀善辨才所念善以何故世間牽以何故受於苦以何故生已生已入隨從汝比丘作如是問不唯然世尊此比丘以意故世間牽以意故受於苦生意生意已入隨從比丘而令世間牽受於苦生已生已入隨從比丘聖弟子無所著以彼牽以彼去彼生已生已則隨從此比丘聖弟子阿羅漢能自御意不自隨意善哉世尊彼比丘聞世尊所説善樂善然可已重問世尊曰唯世尊言多聞比丘言多聞比丘者唯世尊幾所故名多聞比丘如來説幾比丘多聞善哉善哉比丘賢道賢觀辨才所言善世尊多聞多聞比丘者唯世尊幾所故名多聞比丘如來説幾是多聞比丘汝比丘作是問不唯然世尊我多説比丘契一也歌二也記三也偈四也所因五也法句六也譬喻七也所應八也生九也方等十也未曾十一也法説十二比丘族姓子四句偈向我説者則知義知法應法所行等與法俱如法行説如是比丘則是多聞如是比丘為多聞如是如來説比丘多聞善哉世尊彼比丘聞世尊所説善思惟念善樂善然可已重問世尊曰唯世尊比丘聞已比丘聞已智慧捷疾唯世尊所幾名為比丘聞已名為捷疾智慧如來説幾比丘聞已智慧捷疾善哉善哉比丘賢道賢觀辨才所言善唯世尊比丘聞已比丘聞已智慧捷疾世尊説幾比丘聞已智慧捷疾汝比丘問此不唯然世尊此比丘彼比丘聞苦已以智慧知如真苦習苦盡苦盡住處此則為聞彼以智慧知如真苦習苦盡苦盡住處此則為聞彼以智慧知如真如是比丘彼比丘聞已智慧捷疾如來説比丘如是聞已智慧捷疾善哉世尊彼比丘聞世尊所説善樂善然可已重問世尊曰唯世尊比丘聰明辨才捷疾比丘聰明智慧捷疾者唯世尊幾所名為比丘聰明智慧捷疾如來説幾比丘聰明智慧辨才捷疾善哉善哉比丘賢道賢觀辨才所言善唯世尊比丘聰明智慧捷疾比丘聰明辨才捷疾者世尊説幾所名為比丘聰明智慧辨才捷疾如來説幾比丘聰明智慧辨才捷疾汝比丘問此不唯然世尊此比丘謂比丘亦不自念不念他不二念比丘但念意已自饒益及饒益他饒益多人愍世間故以義饒益天及人如是比丘聰明智慧捷疾如來説比丘聰明辨才智慧捷疾善哉世尊彼比丘聞世尊所説善思惟念受持誦讀已從坐起禮世尊足繞世尊離世尊還彼世尊以此喻為説之獨在靜處不亂志寂靜住彼獨在靜處不亂志寂靜住已謂族姓子所為剃鬚髮已被著袈裟信樂出家棄家學道彼無上行梵行見法成神通作證住生已盡梵行已成所作已辦名色已有知如真彼尊者已知法至成阿羅漢佛如是説彼比丘聞世尊所説歡喜而樂
